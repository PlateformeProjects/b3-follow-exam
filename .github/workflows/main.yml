name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify and Inject Firebase Secrets
        env:
          FB_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FB_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$FB_API_KEY" ]; then
            echo "ERREUR : Le secret FIREBASE_API_KEY est vide ou inexistant sur GitHub."
            exit 1
          fi
          if [ -z "$FB_PROJECT_ID" ]; then
            echo "ERREUR : Le secret FIREBASE_PROJECT_ID est vide ou inexistant sur GitHub."
            exit 1
          fi
          
          echo "Injection des secrets en cours..."
          sed -i "s|___FIREBASE_API_KEY___|${{ secrets.FIREBASE_API_KEY }}|g" js/firebase-config.js
          sed -i "s|___FIREBASE_AUTH_DOMAIN___|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" js/firebase-config.js
          sed -i "s|___FIREBASE_PROJECT_ID___|${{ secrets.FIREBASE_PROJECT_ID }}|g" js/firebase-config.js
          sed -i "s|___FIREBASE_STORAGE_BUCKET___|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" js/firebase-config.js
          sed -i "s|___FIREBASE_MESSAGING_SENDER_ID___|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" js/firebase-config.js
          sed -i "s|___FIREBASE_APP_ID___|${{ secrets.FIREBASE_APP_ID }}|g" js/firebase-config.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages
