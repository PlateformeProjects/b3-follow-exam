name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject Firebase Secrets
        env:
          FB_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          sed -i "s|___FIREBASE_API_KEY___|$FB_API_KEY|g" js/firebase-config.js
          sed -i "s|___FIREBASE_AUTH_DOMAIN___|$FB_AUTH_DOMAIN|g" js/firebase-config.js
          sed -i "s|___FIREBASE_PROJECT_ID___|$FB_PROJECT_ID|g" js/firebase-config.js
          sed -i "s|___FIREBASE_STORAGE_BUCKET___|$FB_STORAGE_BUCKET|g" js/firebase-config.js
          sed -i "s|___FIREBASE_MESSAGING_SENDER_ID___|$FB_MESSAGING_SENDER_ID|g" js/firebase-config.js
          sed -i "s|___FIREBASE_APP_ID___|$FB_APP_ID|g" js/firebase-config.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages
