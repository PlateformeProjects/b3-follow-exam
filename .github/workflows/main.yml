name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject Firebase Secrets
        run: |
          echo "Début de l'injection des secrets..."
          
          # Remplacement
          sed -i "s|___FIREBASE_API_KEY___|${{ secrets.FIREBASE_API_KEY }}|g" js/firebase-config.js
          sed -i "s|___FIREBASE_AUTH_DOMAIN___|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" js/firebase-config.js
          sed -i "s|___FIREBASE_PROJECT_ID___|${{ secrets.FIREBASE_PROJECT_ID }}|g" js/firebase-config.js
          sed -i "s|___FIREBASE_STORAGE_BUCKET___|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" js/firebase-config.js
          sed -i "s|___FIREBASE_MESSAGING_SENDER_ID___|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" js/firebase-config.js
          sed -i "s|___FIREBASE_APP_ID___|${{ secrets.FIREBASE_APP_ID }}|g" js/firebase-config.js
          
          echo "Vérification de l'injection (sans afficher les secrets)..."
          
          # On vérifie si un des placeholders est encore présent
          if grep -q "___FIREBASE_" js/firebase-config.js; then
            echo "ERREUR : Certains placeholders n'ont pas été remplacés ! Vérifiez vos noms de secrets."
            grep "___FIREBASE_" js/firebase-config.js
            exit 1
          else
            echo "Succès : Tous les placeholders ont été remplacés."
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages
