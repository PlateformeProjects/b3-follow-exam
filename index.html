<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B3 Follow | Dashboard d'Examen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" href="plateforme_icon.png" />
  </head>
  <body>
    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <header>
      <nav class="container">
        <div class="logo">
          <img src="plateforme_icon.png" alt="Logo" class="school-logo" />
          <h1>B3<span>Follow</span></h1>
        </div>

        <div class="nav-actions">
          <select id="unit-selector" class="unit-dropdown">
            <!-- Units via JS -->
          </select>

          <button
            id="add-student-btn"
            class="btn-icon"
            title="Ajouter un élève"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>

          <button id="export-btn" class="btn-icon" title="Exporter JSON">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </button>

          <button id="export-btn" class="btn-icon" title="Exporter JSON">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 9v-4a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v4"></path>
              <polyline points="17 14 12 9 7 14"></polyline>
              <line x1="12" y1="9" x2="12" y2="21"></line>
            </svg>
          </button>

          <button id="logout-btn" class="btn-icon" title="Déconnexion">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
      </nav>
    </header>

    <main class="container">
      <div class="hero">
        <h2 class="reveal-text">Suivi des projets <span>B3</span></h2>
        <p class="subtitle">
          Visualisez et gérez l'avancement des examens en temps réel.
        </p>
      </div>

      <section id="students-grid" class="bento-grid">
        <!-- Cards via JS -->
      </section>
    </main>

    <!-- Modal d'ajout -->
    <div id="add-modal" class="modal hidden">
      <div class="modal-content bento-card-style">
        <span class="close-btn">&times;</span>
        <div class="modal-header">
          <h3>Nouvel Étudiant</h3>
        </div>
        <form id="add-student-form">
          <div class="input-group">
            <label>Nom complet</label>
            <input
              type="text"
              id="add-student-name"
              required
              placeholder="Ex: Jean Dupont"
            />
          </div>
          <div class="input-group">
            <label>Filière</label>
            <select id="add-student-unit" required></select>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn-main">Créer la fiche</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal d'édition -->
    <div id="edit-modal" class="modal hidden">
      <div class="modal-content modal-large bento-card-style">
        <span class="close-btn">&times;</span>
        <div class="modal-header">
          <h3>Dossier de <span id="edit-student-name"></span></h3>
        </div>
        <form id="edit-form">
          <input type="hidden" id="edit-student-id" />
          <div id="steps-container">
            <!-- Dynamic sections via JS -->
          </div>
          <div class="form-actions">
            <!-- Buttons via JS -->
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
